<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f2ea" />
    <meta
      name="description"
      content="사진과 짧은 메모로 오늘을 기록하는 공개 게시판"
    />
    <title>오늘의 조각</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
      defer
    ></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./" aria-label="오늘의 조각 홈">
        <span class="brand-mark">○</span>
        <span>오늘의 조각</span>
      </a>
      <span class="public-badge"><i></i> public board</span>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <p class="eyebrow">A LITTLE PIECE OF TODAY</p>
        <h1 id="hero-title">스쳐 가기 전에,<br />오늘을 남겨요.</h1>
        <p class="hero-copy">
          사진 한 장과 짧은 메모. 거창하지 않아도 좋은<br class="desktop-only" />
          우리들의 작은 공개 기록장입니다.
        </p>
      </section>

      <section class="composer" aria-labelledby="composer-title">
        <div class="composer-heading">
          <div>
            <p class="section-kicker">NEW PIECE</p>
            <h2 id="composer-title">새 조각 남기기</h2>
          </div>
          <span id="char-count">0 / 500</span>
        </div>

        <form id="post-form">
          <label class="sr-only" for="message">메모</label>
          <textarea
            id="message"
            name="message"
            maxlength="500"
            placeholder="지금 어떤 순간을 보내고 있나요?"
            required
          ></textarea>

          <div id="image-preview-wrap" class="image-preview-wrap" hidden>
            <img id="image-preview" alt="선택한 사진 미리보기" />
            <button
              id="remove-image"
              class="remove-image"
              type="button"
              aria-label="선택한 사진 제거"
            >
              ×
            </button>
          </div>

          <div class="composer-actions">
            <label class="photo-button" for="photo">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M4 7.5h3l1.5-2h7l1.5 2h3v11H4z" />
                <circle cx="12" cy="13" r="3.2" />
              </svg>
              사진 고르기
            </label>
            <input
              id="photo"
              name="photo"
              type="file"
              accept="image/jpeg,image/png,image/webp,image/gif"
            />
            <button id="submit-button" class="submit-button" type="submit">
              <span>기록하기</span>
              <span aria-hidden="true">↗</span>
            </button>
          </div>
          <p class="public-note">
            이곳은 로그인 없이 누구나 볼 수 있는 공개 게시판입니다.
          </p>
        </form>
      </section>

      <section class="feed-section" aria-labelledby="feed-title">
        <div class="feed-heading">
          <div>
            <p class="section-kicker">RECENT PIECES</p>
            <h2 id="feed-title">최근 기록</h2>
          </div>
          <button id="refresh-button" class="refresh-button" type="button">
            새로고침 <span aria-hidden="true">↻</span>
          </button>
        </div>

        <div id="status" class="status" role="status">기록을 불러오는 중...</div>
        <div id="feed" class="feed" aria-live="polite"></div>
      </section>
    </main>

    <footer>
      <span>오늘의 조각</span>
      <span>Small moments, kept together.</span>
    </footer>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
